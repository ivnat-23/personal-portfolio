<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Tanvi Kodoli</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="bg-solid-light" style="padding-top: 120px;">

        <section class="container fade-bottom">
            <div class="section-header reveal">
                <h2 class="text-gradient">Portfolio Showcase</h2>
                <p>Explore my latest works ranging from Android applications to complex web systems.</p>
            </div>
            
            <div class="projects-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 4rem;">
                <!-- Project 1 -->
                <div class="reveal" style="position: relative;">
                    <div class="glass" style="border-radius: 30px; overflow: hidden; height: 500px; display: flex; flex-direction: column; transition: 0.5s; border: 1px solid var(--glass-border);">
                        <div style="height: 60%; overflow: hidden;">
                            <img src="https://via.placeholder.com/500x400" alt="NextStep" style="width: 100%; height: 100%; object-fit: cover; transition: 0.8s;">
                        </div>
                        <div style="padding: 2.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                            <div>
                                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px;">Android</span>
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--secondary-color); text-transform: uppercase; letter-spacing: 2px;">AI Logic</span>
                                </div>
                                <h3 style="font-size: 1.8rem; margin-bottom: 1rem; letter-spacing: -0.03em;">NextStep Predictor</h3>
                            </div>
                            <a href="#" style="font-weight: 700; color: var(--primary-color); text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;">
                                View Case Study <span style="width: 30px; height: 1px; background: var(--primary-color);"></span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Project 2 -->
                <div class="reveal" style="position: relative; margin-top: 3rem;">
                    <div class="glass" style="border-radius: 30px; overflow: hidden; height: 500px; display: flex; flex-direction: column; transition: 0.5s; border: 1px solid var(--glass-border);">
                        <div style="height: 60%; overflow: hidden;">
                            <img src="https://via.placeholder.com/500x400" alt="Grampanchayat" style="width: 100%; height: 100%; object-fit: cover; transition: 0.8s;">
                        </div>
                        <div style="padding: 2.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                            <div>
                                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px;">Governance</span>
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px;">Cloud</span>
                                </div>
                                <h3 style="font-size: 1.8rem; margin-bottom: 1rem; letter-spacing: -0.03em;">Mazi Grampanchayat</h3>
                            </div>
                            <a href="#" style="font-weight: 700; color: var(--primary-color); text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;">
                                View Case Study <span style="width: 30px; height: 1px; background: var(--primary-color);"></span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Project 3 -->
                <div class="reveal" style="position: relative;">
                    <div class="glass" style="border-radius: 30px; overflow: hidden; height: 500px; display: flex; flex-direction: column; transition: 0.5s; border: 1px solid var(--glass-border);">
                        <div style="height: 60%; overflow: hidden;">
                            <img src="https://via.placeholder.com/500x400" alt="KMT" style="width: 100%; height: 100%; object-fit: cover; transition: 0.8s;">
                        </div>
                        <div style="padding: 2.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                            <div>
                                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--secondary-color); text-transform: uppercase; letter-spacing: 2px;">Maps API</span>
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px;">IoT</span>
                                </div>
                                <h3 style="font-size: 1.8rem; margin-bottom: 1rem; letter-spacing: -0.03em;">KMT Connect</h3>
                            </div>
                            <a href="#" style="font-weight: 700; color: var(--primary-color); text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;">
                                View Case Study <span style="width: 30px; height: 1px; background: var(--primary-color);"></span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>


    </main>

    <div id="footer"></div>
    <script src="js/script.js"></script>
    <style>
        .card:hover img {
            transform: scale(1.1);
        }
    </style>
</body>
</html>
