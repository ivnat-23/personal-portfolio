<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Tanvi Kodoli</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="bg-gradient-subtle" style="padding-top: 120px; min-height: 100vh;">
        <div class="container">
            <section class="reveal fade-bottom" style="padding: 0;">
                <h1 class="text-gradient" style="margin-bottom: 2rem; text-align: center;">Get In Touch</h1>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 3rem;">
                <!-- Contact Form -->
                <div class="glass card">
                    <h2 style="margin-bottom: 1.5rem;">Send a Message</h2>
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>

                <!-- Google Maps Iframe -->
                <div class="glass card" style="display: flex; flex-direction: column;">
                    <h2 style="margin-bottom: 1.5rem;">Find My Location</h2>
                    <div style="flex: 1; border-radius: 12px; overflow: hidden; min-height: 300px;">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15286.082262061596!2d74.2235948918911!3d16.700600100000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc1000d0233633b%3A0xc3c54c37563c617b!2sKolhapur%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1714710000000!5m2!1sen!2sin" 
                            width="100%" 
                            height="100%" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>
            </div>
            </section>
        </div>
    </main>

    <div id="footer"></div>
    <script src="js/script.js"></script>
</body>
</html>
