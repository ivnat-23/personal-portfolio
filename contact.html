<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Tanvi Kodoli</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            margin-top: 3rem;
        }

        .contact-info-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .info-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            border-radius: 24px;
            transition: var(--transition);
        }

        .info-card:hover {
            transform: translateX(10px);
            border-color: var(--primary-color);
        }

        .info-icon {
            width: 60px;
            height: 60px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .info-details h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: var(--text-color);
        }

        .info-details p {
            opacity: 0.7;
            font-size: 0.95rem;
        }

        .form-container {
            padding: 3rem;
            border-radius: 32px;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-color);
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-color);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            background: white;
            border-color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        textarea.form-input {
            resize: none;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.3);
        }

        .social-connect {
            margin-top: 3rem;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }

        @media (max-width: 992px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    
    <main class="bg-pattern-grid" style="padding-top: 140px; padding-bottom: 100px;">
        <div class="container">
            <div class="section-header reveal">
                <h1 class="text-gradient responsive-h1">Let's Create Together</h1>
                <p>Have a project in mind or just want to say hi? I'm always open to discussing new opportunities and innovative ideas.</p>
            </div>

            <div class="contact-wrapper">
                <!-- Left Side: Info -->
                <div class="contact-info-section reveal">
                    <div class="glass info-card">
                        <div class="info-icon"><i class="fas fa-envelope-open-text"></i></div>
                        <div class="info-details">
                            <h3>Email Me</h3>
                            <p>tanvikodoli@gmail.com</p>
                        </div>
                    </div>

                    <div class="glass info-card">
                        <div class="info-icon"><i class="fas fa-phone-volume"></i></div>
                        <div class="info-details">
                            <h3>Call Me</h3>
                            <p>+91 9356840838</p>
                        </div>
                    </div>

                    <div class="glass info-card">
                        <div class="info-icon"><i class="fas fa-map-location-dot"></i></div>
                        <div class="info-details">
                            <h3>Visit Me</h3>
                            <p>Kolhapur, Maharashtra, India</p>
                        </div>
                    </div>

                    <div class="social-connect">
                        <h4 style="font-weight: 700; margin-bottom: 1rem;">Connect Socially</h4>
                        <div class="social-links">
                            <a href="https://github.com/ivnat-23" class="glass social-btn"><i class="fab fa-github"></i></a>
                            <a href="https://www.linkedin.com/in/tanvi-kodoli/" class="glass social-btn"><i class="fab fa-linkedin-in"></i></a>
                            <a href="#" class="glass social-btn"><i class="fab fa-instagram"></i></a>
                            <a href="#" class="glass social-btn"><i class="fab fa-twitter"></i></a>
                        </div>
                    </div>
                </div>

                <!-- Right Side: Form -->
                <div class="glass form-container reveal">
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" class="form-input" placeholder="What's your name?" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="Where can I reach you?" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <select id="subject" name="subject" class="form-input" required>
                                <option value="" disabled selected>Select a subject</option>
                                <option value="internship">Internship Opportunity</option>
                                <option value="freelance">Freelance Project</option>
                                <option value="collaboration">Collaboration</option>
                                <option value="other">Just Saying Hi!</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-input" placeholder="Tell me about your idea..." required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" id="submit-btn">
                            <span>Send Message</span>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                    <div id="form-status" style="margin-top: 1.5rem; text-align: center; display: none;"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Form Handling Logic
        (function() {
            // Replace with your EmailJS Public Key
            emailjs.init("YOUR_PUBLIC_KEY"); // User will need to set this up or I can provide a mock behavior
        })();

        const contactForm = document.getElementById('contact-form');
        const statusDiv = document.getElementById('form-status');
        const submitBtn = document.getElementById('submit-btn');

        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Sending...</span> <i class="fas fa-spinner fa-spin"></i>';
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('http://localhost:5000/send-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();
                
                if (result.success) {
                    statusDiv.style.display = 'block';
                    statusDiv.style.color = '#10b981';
                    statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Message sent successfully! I will get back to you soon.';
                    contactForm.reset();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                statusDiv.style.display = 'block';
                statusDiv.style.color = '#ef4444';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Oops! Could not connect to server. Please ensure the backend is running.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Send Message</span> <i class="fas fa-paper-plane"></i>';
            }
        });
    </script>
</body>
</html>
